<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ayappi Canvas</title>
  <link rel="icon" type="image/jpeg" href="./icon.jpeg">

  <meta name="description" content="Thoughts on creativity, blogging, and personal expression.">

  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Ayappi個人サイト">
  <meta property="og:title" content="Home — Ayappi Blog">
  <meta property="og:description" content="Thoughts on creativity, blogging, and personal expression.">
  <meta property="og:url" content="https://ayappi4649.github.io/ayappi_blog/index.html">

  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Home — Ayappi Blog">
  <meta name="twitter:description" content="Thoughts on creativity, blogging, and personal expression.">
  <style>
    :root {
      --bg: #ffffff;
      --text: #111111;
      --muted: #51624f;
      --line: #e2e2de;
      --input-border: #d8d8d4;
      --input-focus: #bcbcb6;
      --input-bg: rgba(255, 255, 255, 0.28);
      --sprite-width: 104px;
      --sprite-height: 120px;
      --floor-offset: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    body {
      position: relative;
      background-image: linear-gradient(180deg, rgba(255, 255, 255, 0.24), rgba(0, 0, 0, 0.012));
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle at 14% 18%, rgba(0,0,0,0.12) 0 1.25px, transparent 1.9px),
        radial-gradient(circle at 77% 28%, rgba(0,0,0,0.11) 0 1.3px, transparent 1.95px),
        radial-gradient(circle at 35% 74%, rgba(0,0,0,0.1) 0 1.18px, transparent 1.82px),
        radial-gradient(circle at 62% 84%, rgba(0,0,0,0.095) 0 1.12px, transparent 1.76px),
        radial-gradient(circle at 10% 12%, rgba(0,0,0,0.085) 0 0.72px, transparent 1.18px),
        radial-gradient(circle at 22% 36%, rgba(0,0,0,0.08) 0 0.68px, transparent 1.12px),
        radial-gradient(circle at 38% 22%, rgba(0,0,0,0.078) 0 0.66px, transparent 1.08px),
        radial-gradient(circle at 52% 48%, rgba(0,0,0,0.074) 0 0.68px, transparent 1.12px),
        radial-gradient(circle at 66% 18%, rgba(0,0,0,0.07) 0 0.64px, transparent 1.04px),
        radial-gradient(circle at 82% 42%, rgba(0,0,0,0.068) 0 0.66px, transparent 1.08px),
        radial-gradient(circle at 8% 58%, rgba(255,255,255,0.13) 0 0.82px, transparent 1.3px),
        radial-gradient(circle at 56% 12%, rgba(255,255,255,0.1) 0 0.76px, transparent 1.22px),
        radial-gradient(circle at 18% 72%, rgba(0,0,0,0.06) 0 0.58px, transparent 0.98px),
        radial-gradient(circle at 44% 86%, rgba(0,0,0,0.056) 0 0.56px, transparent 0.94px),
        radial-gradient(circle at 72% 78%, rgba(0,0,0,0.052) 0 0.54px, transparent 0.92px),
        linear-gradient(115deg, rgba(0,0,0,0.028) 0, rgba(0,0,0,0.028) 1px, transparent 1px, transparent 24px),
        linear-gradient(65deg, rgba(255,255,255,0.08) 0, rgba(255,255,255,0.08) 1px, transparent 1px, transparent 26px);
      background-size: 124px 124px, 142px 142px, 156px 156px, 174px 174px, 26px 26px, 28px 28px, 30px 30px, 28px 28px, 32px 32px, 30px 30px, 74px 74px, 86px 86px, 28px 28px, 30px 30px, 32px 32px, 26px 26px, 30px 30px;
      background-position: 0 0, 40px 54px, 92px 22px, 124px 88px, 0 0, 8px 6px, 12px 10px, 6px 14px, 10px 4px, 16px 12px, 20px 18px, 62px 12px, 4px 18px, 14px 8px, 18px 14px, 0 0, 8px 10px;
      mix-blend-mode: multiply;
      opacity: 0.82;
      filter: blur(0.16px);
      z-index: 0;
    }

    .site-header {
      position: fixed;
      inset-inline: 0;
      top: 0;
      z-index: 20;
      height: 88px;
      pointer-events: none;
    }

    .site-header__inner {
      position: relative;
      height: 100%;
      padding: 24px 34px 0;
    }

    .site-header a {
      position: absolute;
      top: 24px;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--muted);
      text-decoration: none;
      pointer-events: auto;
    }

    .site-header__title {
      left: 34px;
    }

    .site-header__about {
      right: 34px;
    }

    .site-header__tagline {
      position: absolute;
      left: 34px;
      top: 46px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.01em;
      color: rgba(81, 98, 79, 0.88);
      white-space: nowrap;
      pointer-events: none;
    }

    .page-scroll {
      position: relative;
      z-index: 1;
      height: 100vh;
      overflow-y: auto;
      padding-inline: 24px;
    }

    .page-inner {
      max-width: 1080px;
      margin: 0 auto;
      padding: 156px 0 120px;
    }

    .toolbar {
      max-width: 320px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    .search-input,
    .year-select {
      height: 42px;
      border: 1px solid var(--input-border);
      border-radius: 12px;
      background: var(--input-bg);
      outline: none;
      color: var(--text);
      font-size: 13px;
      font-weight: 700;
    }

    .search-input {
      width: 168px;
      padding: 0 18px;
    }

    .search-input::placeholder {
      color: #c7c7c2;
      font-weight: 600;
    }

    .year-wrap {
      position: relative;
      width: 130px;
    }

    .year-select {
      width: 100%;
      appearance: none;
      padding: 0 38px 0 22px;
      cursor: pointer;
    }

    .search-input:focus,
    .year-select:focus {
      border-color: var(--input-focus);
    }

    .year-wrap::after {
      content: "˅";
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      font-size: 16px;
      font-weight: 700;
    }

    .divider {
      width: 100%;
      max-width: 816px;
      height: 1px;
      margin: 20px auto 0;
      background: var(--line);
    }

    .article-list {
      max-width: 520px;
      margin: 0 auto;
      padding-top: 40px;
    }

    .year-group + .year-group {
      margin-top: 42px;
    }

    .year-title {
      margin: 0 0 18px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .article-items {
      display: flex;
      flex-direction: column;
      gap: 34px;
    }

    .article-link {
      display: inline-block;
      max-width: 100%;
      color: var(--text);
      text-decoration: underline;
      text-underline-offset: 4px;
      text-decoration-thickness: 1px;
      font-size: 16px;
      line-height: 1.55;
    }

    .article-link:hover {
      opacity: 0.7;
    }

    .article-date {
      margin-top: 8px;
      font-size: 12px;
      line-height: 1.4;
    }

    .article-summary {
      margin-top: 10px;
      font-size: 13px;
      line-height: 1.75;
      color: rgba(17, 17, 17, 0.68);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      max-width: 100%;
    }

    .empty-state {
      padding-top: 30px;
      font-size: 14px;
      color: #444444;
    }

    .sprite {
      position: fixed;
      left: 0;
      bottom: var(--floor-offset);
      width: var(--sprite-width);
      height: var(--sprite-height);
      pointer-events: none;
      z-index: 30;
      background-repeat: no-repeat;
      image-rendering: pixelated;
      transform: translateZ(0);
    }

    @media (max-width: 640px) {
      .site-header__inner {
        padding-inline: 20px;
      }

      .site-header__title,
      .site-header__tagline {
        left: 20px;
      }

      .site-header__about {
        right: 20px;
      }

      .page-scroll {
        padding-inline: 16px;
      }

      .toolbar {
        max-width: 100%;
        gap: 12px;
      }

      .search-input {
        width: 160px;
      }

      .year-wrap {
        width: 120px;
      }

      .article-list {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="site-header__inner">
      <a class="site-header__title" href="./index.html">Ayappi Canvas</a>
      <div class="site-header__tagline">Life is not colorful, life is coloring</div>
      <a class="site-header__about" href="./about.html">About Me</a>
    </div>
  </header>

  <main class="page-scroll">
    <div class="page-inner">
      <section>
        <div class="toolbar">
          <input id="title-search" class="search-input" type="text" placeholder="タイトル検索..." />
          <div class="year-wrap">
            <select id="year-filter" class="year-select">
              <option value="all">すべて</option>
            </select>
          </div>
        </div>
        <div class="divider"></div>
      </section>

      <section class="article-list" id="article-list"></section>
    </div>
  </main>

  <div id="sprite" class="sprite" aria-hidden="true"></div>

  <script src="./articles.js"></script>
  <script>
    const SPRITE_FRAME_WIDTH = 60;
    const SPRITE_FRAME_HEIGHT = 68;
    const WALK_FRAME_COUNT = 3;
    const MOVE_SPEED = 40;
    const STOP_DISTANCE = 1;
    const CURSOR_ACTIVE_MS = 2200;
    const RANDOM_DELAY_MIN = 1000;
    const RANDOM_DELAY_RANGE = 4200;
    const RANDOM_STOP_CHANCE = 0.8;
    const LEFT_MOVEMENT_AREA_RATIO = 1 / 3;

    const PRIMARY_SPRITE_SOURCES = {
      rightIdle: "./left-idle.png",
      rightWalk: "./left-walk.png",
      leftIdle: "./right-idle.png",
      leftWalk: "./right-walk.png"
    };

    const PRIMARY_IDLE_SPRITE_DIMENSIONS = {
      right: { width: 60, height: 120 },
      left: { width: 60, height: 120 }
    };

    const ARTICLES = Array.isArray(window.ARTICLES) ? window.ARTICLES : [];

    const articleList = document.getElementById("article-list");
    const titleSearch = document.getElementById("title-search");
    const yearFilter = document.getElementById("year-filter");
    const primarySprite = document.getElementById("sprite");

    const globalState = {
      search: "",
      selectedYear: "all",
      viewportWidth: window.innerWidth,
      mouseX: null,
      mouseLastSeen: 0,
      lastFrameTime: performance.now(),
      summaries: {}
    };

    function createActor(options) {
      return {
        spriteElement: options.spriteElement,
        spriteSources: options.spriteSources,
        movementSide: options.movementSide,
        movementRatio: options.movementRatio,
        actorX: options.initialX,
        actorDirection: options.initialDirection,
        actorMoving: false,
        actorFrame: 0,
        targetX: options.initialTargetX,
        frameTimer: 0,
        randomMoveTimer: null,
        isPaused: false,
        idleSpriteDimensions: options.idleSpriteDimensions
      };
    }

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function getMovementBounds(viewportWidth, movementSide, movementRatio) {
      const areaWidth = viewportWidth * movementRatio;

      if (movementSide === "right") {
        const minX = viewportWidth - areaWidth - SPRITE_FRAME_WIDTH * 0.85;
        const maxX = viewportWidth - SPRITE_FRAME_WIDTH * 0.15;
        return { minX, maxX };
      }

      const minX = -SPRITE_FRAME_WIDTH * 0.85;
      const maxX = areaWidth - SPRITE_FRAME_WIDTH * 0.15;
      return { minX, maxX };
    }

    function getInitialTargetX(viewportWidth, movementSide, movementRatio) {
      const bounds = getMovementBounds(viewportWidth, movementSide, movementRatio);
      if (movementSide === "right") {
        return clamp(viewportWidth - viewportWidth * movementRatio * 0.35, bounds.minX, bounds.maxX);
      }
      return clamp(viewportWidth * movementRatio * 0.35, bounds.minX, bounds.maxX);
    }

    function pickRandomTarget(actor) {
      const { minX, maxX } = getMovementBounds(globalState.viewportWidth, actor.movementSide, actor.movementRatio);
      const shortStep = 60 + Math.random() * 140;
      const direction = Math.random() < 0.5 ? -1 : 1;
      const nearbyTarget = clamp(actor.actorX + direction * shortStep, minX, maxX);
      const edgeTarget = Math.random() < 0.18
        ? (Math.random() < 0.5 ? minX : maxX)
        : nearbyTarget;

      return edgeTarget;
    }

    function hasCursorTarget() {
      return globalState.mouseX !== null && Date.now() - globalState.mouseLastSeen < CURSOR_ACTIVE_MS;
    }

    function queueRandomMove(actor) {
      if (actor.randomMoveTimer || hasCursorTarget()) {
        return;
      }

      actor.randomMoveTimer = window.setTimeout(() => {
        actor.isPaused = false;
        actor.targetX = pickRandomTarget(actor);
        actor.randomMoveTimer = null;
      }, RANDOM_DELAY_MIN + Math.random() * RANDOM_DELAY_RANGE);
    }

    function groupArticles(articles) {
      return articles.reduce((acc, article) => {
        const key = String(article.year);
        if (!acc[key]) {
          acc[key] = [];
        }
        acc[key].push(article);
        return acc;
      }, {});
    }

    function formatDisplayDate(dateString) {
      const date = new Date(dateString);
      if (Number.isNaN(date.getTime())) {
        return dateString;
      }

      return date.toLocaleDateString("en-US", {
        month: "long",
        day: "numeric",
        year: "numeric"
      });
    }

    function populateYearOptions() {
      const years = [...new Set(
        ARTICLES
          .map((article) => article.year)
          .filter((year) => year !== undefined && year !== null && year !== "")
      )].sort((a, b) => b - a);

      yearFilter.innerHTML = `
        <option value="all">すべて</option>
        ${years.map((year) => `<option value="${year}">${year}</option>`).join("")}
      `;
    }

    function extractSummaryFromHtml(htmlText) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(htmlText, "text/html");

      doc.querySelectorAll("script, style, img, figure, iframe, video, audio").forEach((node) => node.remove());

      const rawText = (doc.body.textContent || "")
        .replace(/\s+/g, " ")
        .replace(/　+/g, " ")
        .trim();

      if (!rawText) {
        return "";
      }

      const shortened = rawText.slice(0, 120).trim();
      return rawText.length > 120 ? `${shortened}…` : shortened;
    }

    async function loadSummaries() {
      const tasks = ARTICLES.map(async (article) => {
        if (!article.contentFile) {
          globalState.summaries[article.id] = "";
          return;
        }

        try {
          const response = await fetch(article.contentFile);
          if (!response.ok) {
            throw new Error("Failed to load summary source");
          }

          const html = await response.text();
          globalState.summaries[article.id] = extractSummaryFromHtml(html);
        } catch (error) {
          globalState.summaries[article.id] = "";
        }
      });

      await Promise.all(tasks);
    }

    function renderArticles() {
      const normalizedSearch = globalState.search.trim().toLowerCase();
      const filteredArticles = ARTICLES.filter((article) => {
        const matchesSearch = article.title.toLowerCase().includes(normalizedSearch);
        const matchesYear = globalState.selectedYear === "all" || article.year === Number(globalState.selectedYear);
        return matchesSearch && matchesYear;
      });

      if (filteredArticles.length === 0) {
        articleList.innerHTML = '<div class="empty-state">該当する記事がありません。</div>';
        return;
      }

      const sortedArticles = [...filteredArticles].sort((a, b) => {
        const aTime = new Date(a.date).getTime();
        const bTime = new Date(b.date).getTime();

        if (!Number.isNaN(aTime) && !Number.isNaN(bTime) && aTime !== bTime) {
          return bTime - aTime;
        }

        return String(b.date).localeCompare(String(a.date), "ja");
      });

      const grouped = groupArticles(sortedArticles);
      const sortedYears = Object.keys(grouped).map(Number).sort((a, b) => b - a);

      articleList.innerHTML = sortedYears.map((year) => {
        const items = grouped[String(year)].map((article) => {
          const articleUrl = `./article.html?id=${encodeURIComponent(article.id)}`;
          const displayDate = formatDisplayDate(article.date);
          const summary = globalState.summaries[article.id] || "";

          return `
            <article>
              <a class="article-link" href="${articleUrl}">${escapeHtml(article.title)}</a>
              <div class="article-date">${escapeHtml(displayDate)}</div>
              ${summary ? `<div class="article-summary">${escapeHtml(summary)}</div>` : ""}
            </article>
          `;
        }).join("");

        return `
          <div class="year-group">
            <h2 class="year-title">${year}</h2>
            <div class="article-items">${items}</div>
          </div>
        `;
      }).join("");
    }

    function updateSprite(actor) {
      const spriteUrl = actor.actorDirection === "left"
        ? (actor.actorMoving ? actor.spriteSources.leftWalk : actor.spriteSources.leftIdle)
        : (actor.actorMoving ? actor.spriteSources.rightWalk : actor.spriteSources.rightIdle);

      const idleSize = actor.actorDirection === "left"
        ? actor.idleSpriteDimensions.left
        : actor.idleSpriteDimensions.right;

      actor.spriteElement.style.left = `${actor.actorX}px`;
      actor.spriteElement.style.width = actor.actorMoving ? `${SPRITE_FRAME_WIDTH}px` : `${idleSize.width}px`;
      actor.spriteElement.style.height = actor.actorMoving ? `${SPRITE_FRAME_HEIGHT}px` : `${idleSize.height}px`;
      actor.spriteElement.style.backgroundImage = `url(${spriteUrl})`;
      actor.spriteElement.style.backgroundPosition = actor.actorMoving ? `${-actor.actorFrame * SPRITE_FRAME_WIDTH}px 0px` : "center bottom";
      actor.spriteElement.style.backgroundSize = actor.actorMoving
        ? `${SPRITE_FRAME_WIDTH * WALK_FRAME_COUNT}px ${SPRITE_FRAME_HEIGHT}px`
        : "contain";
    }

    function updateActor(actor, elapsed) {
      const movementBounds = getMovementBounds(globalState.viewportWidth, actor.movementSide, actor.movementRatio);
      const currentTarget = hasCursorTarget()
        ? clamp(globalState.mouseX - SPRITE_FRAME_WIDTH / 2, movementBounds.minX, movementBounds.maxX)
        : actor.targetX;

      const distance = currentTarget - actor.actorX;
      const absDistance = Math.abs(distance);

      if (absDistance > STOP_DISTANCE) {
        const step = Math.min(absDistance, MOVE_SPEED * elapsed);
        actor.actorX += Math.sign(distance) * step;
        actor.actorDirection = distance < 0 ? "left" : "right";
        actor.actorMoving = true;
        actor.frameTimer += elapsed;

        if (actor.frameTimer >= 0.16) {
          actor.actorFrame = (actor.actorFrame + 1) % WALK_FRAME_COUNT;
          actor.frameTimer = 0;
        }

        if (actor.randomMoveTimer) {
          window.clearTimeout(actor.randomMoveTimer);
          actor.randomMoveTimer = null;
        }
      } else {
        actor.actorX = currentTarget;
        actor.actorFrame = 0;
        actor.frameTimer = 0;

        if (hasCursorTarget()) {
          actor.actorMoving = false;
          actor.isPaused = false;
        } else if (!actor.isPaused) {
          actor.isPaused = Math.random() < RANDOM_STOP_CHANCE;

          if (actor.isPaused) {
            actor.actorMoving = false;
            queueRandomMove(actor);
          } else {
            actor.actorMoving = true;
            actor.targetX = pickRandomTarget(actor);
          }
        } else {
          actor.actorMoving = false;
        }
      }

      updateSprite(actor);
    }

    const primaryActor = createActor({
      spriteElement: primarySprite,
      spriteSources: PRIMARY_SPRITE_SOURCES,
      movementSide: "left",
      movementRatio: LEFT_MOVEMENT_AREA_RATIO,
      initialX: -SPRITE_FRAME_WIDTH,
      initialTargetX: getInitialTargetX(window.innerWidth, "left", LEFT_MOVEMENT_AREA_RATIO),
      initialDirection: "right",
      idleSpriteDimensions: PRIMARY_IDLE_SPRITE_DIMENSIONS
    });

    function animate(now) {
      const elapsed = (now - globalState.lastFrameTime) / 1000;
      globalState.lastFrameTime = now;

      updateActor(primaryActor, elapsed);

      window.requestAnimationFrame(animate);
    }

    titleSearch.addEventListener("input", (event) => {
      globalState.search = event.target.value;
      renderArticles();
    });

    yearFilter.addEventListener("change", (event) => {
      globalState.selectedYear = event.target.value;
      renderArticles();
    });

    window.addEventListener("resize", () => {
      globalState.viewportWidth = window.innerWidth;
      const movementBounds = getMovementBounds(globalState.viewportWidth, primaryActor.movementSide, primaryActor.movementRatio);
      primaryActor.actorX = clamp(primaryActor.actorX, movementBounds.minX, movementBounds.maxX);
      primaryActor.targetX = clamp(primaryActor.targetX, movementBounds.minX, movementBounds.maxX);
    });

    window.addEventListener("mousemove", (event) => {
      globalState.mouseX = event.clientX;
      globalState.mouseLastSeen = Date.now();

      if (primaryActor.randomMoveTimer) {
        window.clearTimeout(primaryActor.randomMoveTimer);
        primaryActor.randomMoveTimer = null;
      }
    });

    window.addEventListener("mouseleave", () => {
      globalState.mouseX = null;
      globalState.mouseLastSeen = 0;
    });

    async function init() {
      populateYearOptions();
      await loadSummaries();
      renderArticles();
      updateSprite(primaryActor);
      window.requestAnimationFrame(animate);
    }

    init();
  </script>
</body>
</html>
